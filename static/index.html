<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlexCleanUp</title>
<style>
:root { --bg: #1a1a2e; --surface: #16213e; --accent: #e94560; --text: #eee; --muted: #888; --success: #4ecca3; --warn: #f0a500; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab { padding: 8px 16px; background: var(--surface); border: none; color: var(--muted); cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.9rem; }
.tab.active { color: var(--text); background: #1e2a4a; border-bottom: 2px solid var(--accent); }
.stats { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.85rem; color: var(--muted); }
.stats span { background: var(--surface); padding: 6px 12px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
th, td { padding: 10px 12px; text-align: left; font-size: 0.85rem; }
th { background: #1e2a4a; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
tr:not(:last-child) td { border-bottom: 1px solid #1e2a4a; }
tr:hover td { background: rgba(233,69,96,0.05); }
.btn { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
.btn-mark { background: var(--warn); color: #000; }
.btn-delete { background: var(--accent); color: #fff; }
.btn-scan { background: var(--success); color: #000; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
.pagination .btn { background: var(--surface); color: var(--text); }
.pagination .btn.active { background: var(--accent); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
.badge-pending { background: var(--warn); color: #000; }
.badge-immediate { background: var(--accent); color: #fff; }
.badge-scheduled { background: var(--success); color: #000; }
.empty { text-align: center; padding: 40px; color: var(--muted); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); padding: 24px; border-radius: 8px; max-width: 400px; width: 90%; }
.modal h3 { margin-bottom: 12px; }
.modal p { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal .btn-cancel { background: #333; color: var(--text); }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>🎬 PlexCleanUp</h1>
      <div class="subtitle">Manage unwatched content — Netflix style</div>
    </div>
    <div>
      <button class="btn btn-scan" onclick="scanNow()">⟳ Scan Now</button>
      <span id="scanInfo" style="font-size:0.75rem;color:var(--muted);margin-left:8px;"></span>
    </div>
  </div>

  <div class="stats">
    <span>📦 Total Freed: <strong id="totalFreed">0 GB</strong></span>
    <span>⏳ Marked: <strong id="markedCount">0</strong></span>
    <span>🎯 Candidates: <strong id="candidateCount">0</strong></span>
    <span>🗑️ Deletes today: <strong id="dailyRemaining">-</strong></span>
  </div>
  <div id="dryRunBanner" style="display:none;background:#f0a500;color:#000;padding:8px 16px;border-radius:4px;margin-bottom:16px;font-weight:600;text-align:center;">⚠️ DRY RUN MODE — No actual deletions will occur</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('candidates')">Candidates</button>
    <button class="tab" onclick="switchTab('marked')">Leaving Plex Soon</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div id="candidatesTab"></div>
  <div id="markedTab" style="display:none"></div>
  <div id="historyTab" style="display:none"></div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3>⚠️ Delete Now?</h3>
    <p id="confirmMsg">This will permanently delete the selected items from Radarr and add them to the import exclusion list.</p>
    <div class="actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
let currentTab = 'candidates';
let currentPage = 1;
let pendingDeleteKeys = [];
let safetyLimits = {};
let currentSort = {col: 'file_size', dir: 'desc'};
let candidateData = null;

async function loadLimits() {
  safetyLimits = await api('limits');
  document.getElementById('dailyRemaining').textContent = `${safetyLimits.deletions_today} / ${safetyLimits.daily_delete_limit}`;
  document.getElementById('dryRunBanner').style.display = safetyLimits.dry_run ? '' : 'none';
}

function formatSize(bytes) {
  if (!bytes) return '0 B';
  const gb = bytes / (1024**3);
  return gb >= 1 ? gb.toFixed(1) + ' GB' : (bytes / (1024**2)).toFixed(0) + ' MB';
}

function daysSince(epoch) {
  return Math.floor((Date.now()/1000 - epoch) / 86400);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['candidates','marked','history'][i]===tab));
  document.getElementById('candidatesTab').style.display = tab==='candidates' ? '' : 'none';
  document.getElementById('markedTab').style.display = tab==='marked' ? '' : 'none';
  document.getElementById('historyTab').style.display = tab==='history' ? '' : 'none';
  if (tab==='candidates') loadCandidates();
  else if (tab==='marked') loadMarked();
  else loadHistory();
}

async function api(path, opts) {
  const r = await fetch('/api/'+path, opts);
  return r.json();
}

function sortIcon(col) {
  if (currentSort.col !== col) return ' ↕';
  return currentSort.dir === 'asc' ? ' ↑' : ' ↓';
}

function toggleSort(col) {
  if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  else { currentSort.col = col; currentSort.dir = col === 'title' ? 'asc' : 'desc'; }
  renderCandidates();
}

function sortItems(items) {
  const col = currentSort.col;
  const dir = currentSort.dir === 'asc' ? 1 : -1;
  return [...items].sort((a,b) => {
    let va = a[col], vb = b[col];
    if (col === 'title') { va = (va||'').toLowerCase(); vb = (vb||'').toLowerCase(); }
    if (col === 'days') { va = daysSince(a.addedAt); vb = daysSince(b.addedAt); }
    if (va < vb) return -1 * dir;
    if (va > vb) return 1 * dir;
    return 0;
  });
}

async function loadCandidates() {
  candidateData = await api(`candidates?page=${currentPage}&page_size=100`);
  document.getElementById('candidateCount').textContent = candidateData.total;
  renderCandidates();
}

function renderCandidates() {
  const el = document.getElementById('candidatesTab');
  if (!candidateData || !candidateData.items.length) { el.innerHTML = '<div class="empty">No candidates found. All content is being watched! 🎉</div>'; return; }
  const sorted = sortItems(candidateData.items);
  const pageSize = safetyLimits.max_mark_per_request || 15;
  const start = (currentPage - 1) * pageSize;
  const paged = sorted.slice(start, start + pageSize);
  const thStyle = 'cursor:pointer;user-select:none;';
  let html = `<table><tr>
    <th style="${thStyle}" onclick="toggleSort('title')">Title${sortIcon('title')}</th>
    <th style="${thStyle}" onclick="toggleSort('year')">Year${sortIcon('year')}</th>
    <th style="${thStyle}" onclick="toggleSort('addedAt')">Added${sortIcon('addedAt')}</th>
    <th style="${thStyle}" onclick="toggleSort('days')">Days${sortIcon('days')}</th>
    <th style="${thStyle}" onclick="toggleSort('file_size')">Size${sortIcon('file_size')}</th>
    <th style="${thStyle}" onclick="toggleSort('play_count')">Plays${sortIcon('play_count')}</th>
    <th>Viewers</th>
    <th>Actions</th></tr>`;
  for (const m of paged) {
    const viewers = m.user_plays ? Object.entries(m.user_plays).map(([u,c])=>`${u}(${c})`).join(', ') : '';
    const lastViewed = m.last_viewed_at ? new Date(m.last_viewed_at*1000).toLocaleDateString() : 'Never';
    html += `<tr>
      <td>${m.title}</td><td>${m.year||''}</td>
      <td>${new Date(m.addedAt*1000).toLocaleDateString()}</td>
      <td>${daysSince(m.addedAt)}d</td>
      <td>${formatSize(m.file_size)}</td>
      <td>${m.play_count||0}</td>
      <td style="font-size:0.75rem;color:var(--muted)">${viewers||'—'}</td>
      <td>
        <button class="btn btn-mark" onclick="markItem('${m.ratingKey}')">Mark</button>
        <button class="btn btn-delete" onclick="showDeleteModal(['${m.ratingKey}'])">Delete</button>
      </td></tr>`;
  }
  html += '</table>';
  const pages = Math.ceil(sorted.length / pageSize);
  if (pages > 1) {
    html += '<div class="pagination">';
    for (let i=1;i<=pages;i++) html += `<button class="btn ${i===currentPage?'active':''}" onclick="currentPage=${i};renderCandidates()">${i}</button>`;
    html += '</div>';
  }
  el.innerHTML = html;
}

async function loadMarked() {
  const data = await api('marked');
  document.getElementById('markedCount').textContent = data.items.length;
  const el = document.getElementById('markedTab');
  if (!data.items.length) { el.innerHTML = '<div class="empty">No items marked for removal.</div>'; return; }
  let html = `<table><tr><th>Title</th><th>Year</th><th>Size</th><th>Days Left</th><th>Actions</th></tr>`;
  for (const m of data.items) {
    html += `<tr>
      <td>${m.title}</td><td>${m.year||''}</td>
      <td>${formatSize(m.file_size)}</td>
      <td><span class="badge badge-pending">${m.days_left}d</span></td>
      <td><button class="btn btn-delete" onclick="showDeleteModal(['${m.plex_rating_key}'])">Delete Now</button></td>
    </tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

async function loadHistory() {
  const data = await api('history');
  document.getElementById('totalFreed').textContent = formatSize(data.total_freed);
  const el = document.getElementById('historyTab');
  if (!data.items.length) { el.innerHTML = '<div class="empty">No deletion history yet.</div>'; return; }
  let html = `<table><tr><th>Title</th><th>Year</th><th>Size</th><th>Deleted</th><th>Method</th></tr>`;
  for (const m of data.items) {
    const badge = m.method==='immediate' ? 'badge-immediate' : 'badge-scheduled';
    html += `<tr>
      <td>${m.title}</td><td>${m.year||''}</td>
      <td>${formatSize(m.file_size)}</td>
      <td>${new Date(m.deleted_at).toLocaleDateString()}</td>
      <td><span class="badge ${badge}">${m.method}</span></td>
    </tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

async function markItem(rk) {
  await api('mark', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rating_keys:[rk]})});
  loadCandidates();
  loadScanState();
}

function showDeleteModal(keys) {
  pendingDeleteKeys = keys;
  document.getElementById('confirmMsg').textContent = `Permanently delete ${keys.length} item(s) from Radarr and block re-download?`;
  document.getElementById('confirmModal').classList.add('show');
}

function closeModal() { document.getElementById('confirmModal').classList.remove('show'); }

async function confirmDelete() {
  closeModal();
  const r = await fetch('/api/delete-now', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rating_keys:pendingDeleteKeys})});
  if (!r.ok) {
    const err = await r.json();
    alert('⚠️ ' + (err.detail || 'Delete failed'));
    return;
  }
  await r.json();
  if (currentTab==='candidates') loadCandidates();
  else if (currentTab==='marked') loadMarked();
  loadHistory();
  loadScanState();
  loadLimits();
}

async function scanNow() {
  document.getElementById('scanInfo').textContent = 'Scanning...';
  await api('scan-now', {method:'POST'});
  loadCandidates();
  loadScanState();
}

async function loadScanState() {
  const data = await api('scan-state');
  const info = document.getElementById('scanInfo');
  if (data.last_scan_at) info.textContent = `Last scan: ${new Date(data.last_scan_at).toLocaleString()}`;
  const marked = await api('marked');
  document.getElementById('markedCount').textContent = marked.items.length;
}

// Init
loadLimits();
loadCandidates();
loadScanState();
loadHistory().then(() => {}); // load total freed
</script>
</body>
</html>
